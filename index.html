<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ExamKit</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <header class="header">
    <span class="header-logo">ExamKit</span>
  </header>

  <main class="container">
    <div class="landing-hero">
      <h1>Select an Exam</h1>
      <p>Choose from the available exams below. Once you start, the timer begins immediately.</p>
      <label class="scramble-toggle" title="Scramble questions and answers">
        <input type="checkbox" id="scramble-toggle">
        <span class="scramble-icon">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="16 3 21 3 21 8"/>
            <line x1="4" y1="20" x2="21" y2="3"/>
            <polyline points="21 16 21 21 16 21"/>
            <line x1="15" y1="15" x2="21" y2="21"/>
          </svg>
        </span>
        <span class="scramble-label">Scramble questions &amp; answers</span>
      </label>
    </div>

    <div id="load-error" role="alert"></div>
    <div id="exam-grid" class="exam-grid"></div>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
